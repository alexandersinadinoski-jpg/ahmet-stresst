<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ahmet Stresst</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#111;
  display:flex;align-items:center;justify-content:center;
  height:100dvh;overflow:hidden;
  font-family:'Courier New',monospace;
  touch-action:none;
}
#wrap{
  position:relative;
  width:min(420px,100vw);
  height:min(700px,100dvh);
  overflow:hidden;
  border:3px solid #f0c040;
  border-radius:10px;
  box-shadow:0 0 30px rgba(240,192,64,0.4);
}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;}

/* SCREENS */
.scr{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(5,5,18,0.97);
  z-index:20;padding:16px;text-align:center;
}
.scr.off{display:none;}
h1{
  font-size:2.6rem;font-weight:900;color:#f0c040;
  text-shadow:3px 3px 0 #c00,6px 6px 0 #600;
  letter-spacing:3px;line-height:1.1;margin-bottom:4px;
}
.sub{font-size:0.78rem;color:#666;margin-bottom:18px;}
.grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;width:100%;max-width:290px;margin-bottom:14px;
}
.card{
  background:#0e0e26;border:2px solid #333;border-radius:10px;
  padding:9px 5px;cursor:pointer;user-select:none;transition:.12s;
}
.card.on,.card:active{border-color:#f0c040;background:#1c1c3a;transform:scale(1.04);}
.ce{font-size:1.9rem;display:block;margin-bottom:3px;}
.cn{color:#f0c040;font-size:0.85rem;font-weight:bold;}
.cd{color:#666;font-size:0.58rem;margin-top:2px;}
.btn-main{
  background:#f0c040;color:#000;border:none;
  padding:16px 36px;font-size:1.1rem;font-weight:900;
  border-radius:8px;cursor:pointer;font-family:'Courier New',monospace;
  text-transform:uppercase;letter-spacing:1px;
  box-shadow:0 5px 0 #a08000;touch-action:manipulation;
  width:100%;max-width:290px;margin-bottom:8px;
}
.btn-main:active{transform:translateY(4px);box-shadow:0 1px 0 #a08000;}
.btn-sec{
  background:transparent;border:1px solid #444;color:#777;
  padding:10px 24px;border-radius:20px;font-size:0.72rem;
  cursor:pointer;font-family:'Courier New',monospace;
  touch-action:manipulation;
}

/* HUD */
#hud{
  position:absolute;top:0;left:0;right:0;z-index:10;
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 12px;background:rgba(0,0,0,0.6);pointer-events:none;
}
#hud.off{display:none;}
.hs{color:#f0c040;font-weight:bold;font-size:.9rem;}
.lives{font-size:1rem;letter-spacing:2px;}

/* SPEECH BUBBLE */
#bub{
  position:absolute;background:#fff;color:#111;
  font-size:.85rem;font-weight:900;
  padding:8px 12px;border-radius:12px;border:3px solid #222;
  max-width:180px;text-align:center;z-index:15;
  pointer-events:none;opacity:0;transition:opacity .15s;line-height:1.4;
  left:80px;top:50px;
  box-shadow:0 3px 10px rgba(0,0,0,0.5);
}
#bub::after{
  content:'';position:absolute;bottom:-11px;left:22px;
  border:6px solid transparent;border-top-color:#222;
}
#bub.on{opacity:1;}

/* FLASH */
#flash{
  position:absolute;inset:0;background:rgba(255,0,0,0.5);
  z-index:18;opacity:0;pointer-events:none;transition:opacity .07s;
}
#flash.on{opacity:1;}

/* TOUCH CONTROLS — two big halves */
#ctrlUp,#ctrlDown{
  position:absolute;left:0;right:0;z-index:8;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
#ctrlUp{
  top:50px;height:calc(45% - 25px);
}
#ctrlDown{
  bottom:0;height:45%;
}
#ctrlUp::after{
  content:'▲';font-size:2.5rem;
  color:rgba(240,192,64,0.12);
  pointer-events:none;
}
#ctrlDown::after{
  content:'▼';font-size:2.5rem;
  color:rgba(240,192,64,0.12);
  pointer-events:none;
}
#ctrlUp.off,#ctrlDown.off{display:none;}

/* PROGRESS BAR */
#prog{
  position:absolute;bottom:0;left:0;height:5px;
  background:#f0c040;z-index:10;width:0%;
  transition:width .3s;
}

/* MUSIC BTN */
#musicBtn{
  position:absolute;top:36px;right:8px;z-index:12;
  background:rgba(0,0,0,0.5);border:2px solid rgba(240,192,64,0.4);
  border-radius:50%;width:36px;height:36px;
  color:#f0c040;font-size:1rem;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  touch-action:manipulation;
}
#musicBtn.show{display:flex;}

/* END SCREENS */
.big{font-size:4rem;margin-bottom:6px;animation:pp .5s infinite alternate;}
@keyframes pp{from{transform:scale(1)}to{transform:scale(1.09)}}
.ot{font-size:1.9rem;font-weight:900;color:#f33;text-shadow:2px 2px 0 #600;margin-bottom:4px;}
.oq{font-size:.85rem;color:#f0c040;font-style:italic;margin-bottom:14px;max-width:260px;}
.os{font-size:.85rem;color:#aaa;margin-bottom:14px;}
.os span{color:#f0c040;font-size:1.2rem;font-weight:bold;}
.wt{font-size:1.7rem;font-weight:900;color:#4eff91;margin-bottom:5px;}
.ws{font-size:.82rem;color:#aaa;margin-bottom:14px;max-width:260px;}
.btn-back{
  margin-top:8px;background:transparent;border:1px solid #444;
  color:#888;padding:10px 22px;border-radius:20px;font-size:0.72rem;
  font-weight:bold;cursor:pointer;font-family:'Courier New',monospace;
  text-transform:uppercase;letter-spacing:1px;touch-action:manipulation;
  display:block;width:100%;max-width:290px;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="flash"></div>
  <div id="bub"></div>
  <div id="prog"></div>

  <!-- Touch controls -->
  <div id="ctrlUp" class="off"></div>
  <div id="ctrlDown" class="off"></div>

  <!-- Music toggle -->
  <div id="musicBtn" onclick="toggleMusic()">🔇</div>

  <!-- HUD -->
  <div id="hud" class="off">
    <div class="hs">Score: <span id="sv">0</span></div>
    <div class="lives" id="lv">❤️❤️❤️</div>
  </div>

  <!-- START -->
  <div class="scr" id="sStart">
    <h1>AHMET<br>STRESST</h1>
    <div class="sub">Berchtesgaden — Freitagabend 🏔️</div>
    <div class="grid">
      <div class="card on" data-c="sino" onclick="pick(this)">
        <span class="ce">🛹</span>
        <div class="cn">SINO</div>
        <div class="cd">Seriös & cool</div>
      </div>
      <div class="card" data-c="oemer" onclick="pick(this)">
        <span class="ce">🍕</span>
        <div class="cn">ÖMER</div>
        <div class="cd">Ahmets Cousin</div>
      </div>
      <div class="card" data-c="labi" onclick="pick(this)">
        <span class="ce">🌿</span>
        <div class="cn">LABI</div>
        <div class="cd">Ahmets Bro</div>
      </div>
      <div class="card" data-c="koller" onclick="pick(this)">
        <span class="ce">🍺</span>
        <div class="cn">KOLLER</div>
        <div class="cd">Todesbesoffen</div>
      </div>
    </div>
    <button class="btn-main" id="btnStart" onclick="startWithMusic()">
      🎵 LOS GEHT'S!
    </button>
    <button class="btn-sec" onclick="startGame()">Ohne Musik</button>
  </div>

  <!-- GAME OVER -->
  <div class="scr off" id="sOver">
    <div class="big" id="oEm">😤</div>
    <div class="ot">GETROFFEN!</div>
    <div class="oq" id="oQ">"Einsatz verpasst."</div>
    <div class="os">Score: <span id="oSc">0</span></div>
    <button class="btn-main" onclick="restart()" style="margin-bottom:8px">NOCHMAL!</button>
    <button class="btn-back" onclick="goMenu()">← Charakter wechseln</button>
  </div>

  <!-- WIN -->
  <div class="scr off" id="sWin">
    <div style="font-size:3rem;margin-bottom:6px">🏔️🎉</div>
    <div class="wt">ENTKOMMEN!</div>
    <div class="ws">"Du scheiß Otze..."<br>— Ahmet, frustriert</div>
    <div class="os">Score: <span id="wSc">0</span></div>
    <button class="btn-main" onclick="restart()" style="margin-bottom:8px">NOCHMAL!</button>
    <button class="btn-back" onclick="goMenu()">← Charakter wechseln</button>
  </div>
</div>

// ── STATE ──
const $ = id => document.getElementById(id);
let sel='sino', running=false, raf=null;
let ticks,score,lives,py,pyTarget;
let projectiles,spawnTimer,bubTimer,invincible,invTick;
let ahmetThrow,ahmetThrowTick;

function pick(el){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  sel=el.dataset.c;
}

function show(id){$(id).classList.remove('off');}
function hide(id){$(id).classList.add('off');}

// ── START WITH MUSIC (iOS needs user gesture) ──
function startWithMusic(){
  music.currentTime=0;
  music.play().then(()=>{
    musicOn=true;
    $('musicBtn').textContent='🎵';
  }).catch(()=>{
    musicOn=false;
    $('musicBtn').textContent='🔇';
  });
  startGame();
}

function startGame(){
  hide('sStart');hide('sOver');hide('sWin');
  show('hud');
  $('ctrlUp').classList.remove('off');
  $('ctrlDown').classList.remove('off');
  $('musicBtn').classList.add('show');
  initGame();
  running=true;
  cancelAnimationFrame(raf);
  raf=requestAnimationFrame(loop);
}

function initGame(){
  ticks=0;score=0;lives=3;
  py=C.height/2; pyTarget=py;
  projectiles=[];spawnTimer=120;bubTimer=0;
  invincible=false;invTick=0;
  ahmetThrow=false;ahmetThrowTick=0;
  $('sv').textContent='0';
  $('lv').textContent='❤️❤️❤️';
  $('prog').style.width='0%';
  $('bub').classList.remove('on');
}

function loop(){
  if(!running)return;
  update();render();
  raf=requestAnimationFrame(loop);
}

// ── UPDATE ──
function update(){
  ticks++;
  if(ticks>=60*60){winGame();return;}

  const H=C.height;
  const W=C.width;
  const progress=ticks/(60*60);

  score=Math.floor(ticks/6);
  $('sv').textContent=score;
  $('prog').style.width=(progress*100)+'%';

  // Player follows target smoothly
  const pR=30;
  const pyMin=80+pR;
  const pyMax=H-10-pR;
  // Clamp TARGET too so it never gets stuck
  pyTarget=Math.max(pyMin,Math.min(pyMax,pyTarget));
  py+=(pyTarget-py)*0.2;
  py=Math.max(pyMin,Math.min(pyMax,py));

  // Invincibility
  if(invincible){invTick--;if(invTick<=0)invincible=false;}
  if(ahmetThrow){ahmetThrowTick--;if(ahmetThrowTick<=0)ahmetThrow=false;}

  // Spawn
  spawnTimer--;
  if(spawnTimer<=0){
    spawn(progress);
    spawnTimer=Math.max(45,140-progress*95)|0;
    spawnTimer+=(Math.random()*20-10)|0;
  }

  // Move projectiles + collision
  const px=W-52;
  for(let p of projectiles){
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=p.curve;
    p.angle+=p.spin;
    // collision
    if(!invincible){
      const dx=p.x-px, dy=p.y-py;
      if(Math.sqrt(dx*dx+dy*dy)<p.r+pR-2){
        lives--;
        updateLives();
        invincible=true;invTick=90;
        flashRed();
        p.x=-999;
        if(lives<=0){gameOver();return;}
      }
    }
  }
  projectiles=projectiles.filter(p=>p.x>-50&&p.x<W+50&&p.y<H+50);

  // Quote timer
  if(bubTimer>0)bubTimer--;
  else $('bub').classList.remove('on');
}

function spawn(progress){
  const H=C.height,W=C.width;
  const obj=OBJS[Math.floor(Math.random()*OBJS.length)];
  const spd=5+progress*7+Math.random()*2;
  const startX=78, startY=H*0.41;
  const px=W-52;
  // Aim at player with spread
  const spread=(1-progress*0.6)*H*0.22;
  const targetY=py+(Math.random()-0.5)*spread;
  const dx=px-startX, dy=targetY-startY;
  const len=Math.sqrt(dx*dx+dy*dy);
  const count=progress>0.6?(Math.random()<0.4?3:2):progress>0.3?(Math.random()<0.45?2:1):1;
  for(let i=0;i<count;i++){
    const off=(i-(count-1)/2)*H*0.1;
    projectiles.push({
      x:startX,y:startY,
      vx:(dx/len)*spd,
      vy:(dy/len)*spd+(off/len)*spd*0.5,
      r:obj.r,c:obj.c,e:obj.e,
      curve:0.04+Math.random()*0.05,
      spin:(Math.random()-0.5)*0.2,
      angle:0,
    });
  }
  ahmetThrow=true;ahmetThrowTick=28;
  if(Math.random()<0.7){
    showBub(QUOTES[Math.floor(Math.random()*QUOTES.length)]);
  }
}

function updateLives(){
  const h=['','❤️','❤️❤️','❤️❤️❤️'];
  $('lv').textContent=h[Math.max(0,lives)]||'💀';
}

// ── RENDER ──
function render(){
  const W=C.width,H=C.height;
  cx.clearRect(0,0,W,H);
  drawBG(W,H);
  // Projectiles
  for(let p of projectiles){
    cx.save();
    cx.translate(p.x,p.y);
    cx.rotate(p.angle);
    cx.fillStyle=p.c;
    cx.beginPath();cx.arc(0,0,p.r,0,Math.PI*2);cx.fill();
    cx.strokeStyle='rgba(0,0,0,0.25)';cx.lineWidth=1.5;cx.stroke();
    cx.font=p.r*1.3+'px serif';
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(p.e,0,1);
    cx.restore();
  }
  drawAhmet(46,H*0.44,ahmetThrow);
  const px=C.width-52;
  if(!invincible||Math.floor(Date.now()/80)%2===0) drawPlayer(px,py);
}

function drawBG(W,H){
  const GY=H*0.58;
  // Sky
  const sk=cx.createLinearGradient(0,0,0,GY);
  sk.addColorStop(0,'#0d1f3a');
  sk.addColorStop(0.5,'#1e3a60');
  sk.addColorStop(1,'#c06830');
  cx.fillStyle=sk;cx.fillRect(0,0,W,GY);
  // Moon
  cx.fillStyle='rgba(255,245,200,0.9)';
  cx.beginPath();cx.arc(W*0.84,H*0.09,14,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(20,40,90,0.6)';
  cx.beginPath();cx.arc(W*0.84+5,H*0.09,12,0,Math.PI*2);cx.fill();
  // Stars
  cx.fillStyle='rgba(255,255,255,0.7)';
  [[0.08,0.05],[0.2,0.11],[0.32,0.04],[0.55,0.07],[0.14,0.17],[0.44,0.14]].forEach(s=>{
    cx.beginPath();cx.arc(W*s[0],H*s[1],1.5,0,Math.PI*2);cx.fill();
  });
  // Watzmann
  cx.fillStyle='#243040';
  cx.beginPath();
  cx.moveTo(-10,GY);
  cx.lineTo(W*0.22,GY-H*0.24);cx.lineTo(W*0.36,GY-H*0.36);
  cx.lineTo(W*0.46,GY-H*0.45);cx.lineTo(W*0.56,GY-H*0.34);
  cx.lineTo(W*0.68,GY-H*0.21);cx.lineTo(W+10,GY);
  cx.closePath();cx.fill();
  // Snow
  cx.fillStyle='rgba(235,242,255,0.88)';
  cx.beginPath();
  cx.moveTo(W*0.41,GY-H*0.39);cx.lineTo(W*0.46,GY-H*0.45);
  cx.lineTo(W*0.52,GY-H*0.38);cx.lineTo(W*0.44,GY-H*0.36);
  cx.closePath();cx.fill();
  // Pine trees
  cx.fillStyle='#0d1e12';
  [[0.03,0.16],[0.09,0.13],[0.77,0.15],[0.85,0.18],[0.92,0.13]].forEach(([tx,th])=>{
    const bx=W*tx,by=GY,bh=H*th;
    for(let j=0;j<3;j++){
      cx.beginPath();
      cx.moveTo(bx,by-bh+bh*j*0.22);
      cx.lineTo(bx+12-j*2,by-bh+bh*(j*0.22+0.38));
      cx.lineTo(bx-12+j*2,by-bh+bh*(j*0.22+0.38));
      cx.closePath();cx.fill();
    }
  });
  // Left Gasthof
  cx.fillStyle='#c8a878';cx.fillRect(0,GY-H*0.28,W*0.21,H*0.28);
  cx.fillStyle='#7a3e18';
  cx.beginPath();cx.moveTo(-4,GY-H*0.28);cx.lineTo(W*0.105,GY-H*0.43);cx.lineTo(W*0.22,GY-H*0.28);cx.closePath();cx.fill();
  cx.fillStyle='rgba(255,200,70,0.85)';
  cx.fillRect(W*0.02,GY-H*0.24,W*0.06,H*0.065);
  cx.fillRect(W*0.11,GY-H*0.24,W*0.06,H*0.065);
  cx.fillRect(W*0.02,GY-H*0.13,W*0.06,H*0.06);
  cx.fillRect(W*0.11,GY-H*0.13,W*0.06,H*0.06);
  cx.fillStyle='#5a3010';cx.fillRect(W*0.03,GY-H*0.32,W*0.14,H*0.03);
  cx.fillStyle='rgba(255,215,80,0.9)';
  cx.font='bold '+Math.max(8,W*0.027)+'px Courier New';
  cx.textAlign='center';cx.fillText('GASTHOF',W*0.1,GY-H*0.305);
  // Right building
  cx.fillStyle='#b09870';cx.fillRect(W*0.79,GY-H*0.24,W*0.21,H*0.24);
  cx.fillStyle='#6a3810';
  cx.beginPath();cx.moveTo(W*0.77,GY-H*0.24);cx.lineTo(W*0.895,GY-H*0.37);cx.lineTo(W*1.02,GY-H*0.24);cx.closePath();cx.fill();
  cx.fillStyle='rgba(255,200,70,0.8)';
  cx.fillRect(W*0.81,GY-H*0.2,W*0.07,H*0.06);cx.fillRect(W*0.9,GY-H*0.2,W*0.07,H*0.06);
  // Lamp
  cx.fillStyle='#666';cx.fillRect(W*0.485,GY-H*0.2,4,H*0.2);
  cx.fillStyle='rgba(255,220,100,0.15)';cx.beginPath();cx.arc(W*0.487,GY-H*0.19,26,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(255,215,80,0.8)';cx.beginPath();cx.arc(W*0.487,GY-H*0.19,5,0,Math.PI*2);cx.fill();
  // Ground
  cx.fillStyle='#6a5840';cx.fillRect(0,GY,W,H-GY);
  cx.fillStyle='#3a2e1e';cx.fillRect(0,GY,W,3);
  cx.strokeStyle='rgba(20,14,6,0.3)';cx.lineWidth=1;
  for(let x=0;x<W;x+=26){cx.beginPath();cx.moveTo(x,GY);cx.lineTo(x,H);cx.stroke();}
  for(let y=GY;y<H;y+=18){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
  cx.textAlign='left';
}

function drawAhmet(x,y,throwing){
  const H=C.height,GY=H*0.58;
  const hR=44,hCX=x,hCY=y-hR-4;
  const bW=hR*1.6,bH=hR*1.35,bY=hCY+hR;
  // Shadow
  cx.fillStyle='rgba(0,0,0,0.18)';
  cx.beginPath();cx.ellipse(x,GY+2,20,5,0,0,Math.PI*2);cx.fill();
  // Legs
  cx.fillStyle='#181830';
  const fr=Math.floor(Date.now()/100)%2;
  cx.fillRect(x-bW*0.45,bY+bH,bW*0.28,bH*0.55+(fr?5:0));
  cx.fillRect(x+bW*0.15,bY+bH,bW*0.28,bH*0.55+(fr?0:5));
  // Body
  cx.fillStyle='#3a5aa0';
  cx.beginPath();cx.roundRect(x-bW/2,bY,bW,bH,5);cx.fill();
  // Throwing arm
  cx.fillStyle='#3a5aa0';
  if(throwing){
    cx.fillRect(x+bW*0.5,bY+8,hR*1.1,hR*0.38);
    cx.fillStyle='#f5c5a0';
    cx.fillRect(x+bW*0.5+hR*1.1,bY+4,hR*0.3,hR*0.45);
    cx.fillStyle='#f5c5a0';
    for(let i=0;i<3;i++)cx.fillRect(x+bW*0.5+hR*1.4+i*4,bY+4+i*2,4,8);
  } else {
    cx.fillRect(x+bW*0.5,bY+8,hR*0.5,hR*0.32);
    cx.fillRect(x-bW*0.5-hR*0.5,bY+10,hR*0.5,hR*0.32);
  }
  // Beer bottle
  cx.fillStyle='#d4a800';cx.fillRect(x-bW*0.5-hR*0.5,bY+hR*0.45,hR*0.2,hR*0.65);
  cx.fillStyle='#f0c040';cx.fillRect(x-bW*0.5-hR*0.48,bY+hR*0.28,hR*0.17,hR*0.2);
  // Head photo
  cx.save();
  cx.beginPath();cx.arc(hCX,hCY,hR,0,Math.PI*2);cx.clip();
  const im=imgs.ahmet;
  if(im.complete&&im.naturalWidth>0)cx.drawImage(im,hCX-hR,hCY-hR,hR*2,hR*2);
  else{cx.fillStyle='#f5c5a0';cx.beginPath();cx.arc(hCX,hCY,hR,0,Math.PI*2);cx.fill();}
  cx.restore();
  // Ring
  cx.strokeStyle=throwing?'rgba(220,0,0,0.9)':'rgba(255,255,255,0.3)';
  cx.lineWidth=throwing?4:2;
  cx.beginPath();cx.arc(hCX,hCY,hR+2,0,Math.PI*2);cx.stroke();
  if(throwing){
    cx.strokeStyle='rgba(255,40,0,0.2)';cx.lineWidth=10;
    cx.beginPath();cx.arc(hCX,hCY,hR+8,0,Math.PI*2);cx.stroke();
  }
  // Label
  cx.fillStyle='rgba(220,0,0,0.85)';
  cx.font='bold 9px Courier New';cx.textAlign='center';
  cx.fillText('AHMET',hCX,hCY-hR-7);
  cx.textAlign='left';
}

function drawPlayer(x,y){
  const H=C.height,GY=H*0.58;
  const ch=CHARS[sel];
  const hR=36,hCY=y-hR-2;
  const bW=58,bH=46,bY=hCY+hR;
  const fr=Math.floor(Date.now()/130)%2;
  // Shadow
  cx.fillStyle='rgba(0,0,0,0.15)';
  cx.beginPath();cx.ellipse(x,GY+2,16,4,0,0,Math.PI*2);cx.fill();
  // Legs
  cx.fillStyle='#22224a';
  cx.fillRect(x-18,bY+bH,11,18+(fr?-5:0));
  cx.fillRect(x+7,bY+bH,11,18+(fr?0:-5));
  // Body
  cx.fillStyle=ch.col;
  cx.beginPath();cx.roundRect(x-bW/2,bY,bW,bH,5);cx.fill();
  // Arms
  cx.fillRect(x-bW/2-14,bY+6,14,9+(fr?2:0));
  cx.fillRect(x+bW/2,bY+6,14,9+(fr?0:2));
  // Head photo
  cx.save();
  cx.beginPath();cx.arc(x,hCY,hR,0,Math.PI*2);cx.clip();
  const im=imgs[sel];
  if(im&&im.complete&&im.naturalWidth>0)cx.drawImage(im,x-hR,hCY-hR,hR*2,hR*2);
  else{cx.fillStyle='#f5c5a0';cx.beginPath();cx.arc(x,hCY,hR,0,Math.PI*2);cx.fill();}
  cx.restore();
  cx.strokeStyle='rgba(255,255,255,0.3)';cx.lineWidth=2;
  cx.beginPath();cx.arc(x,hCY,hR+2,0,Math.PI*2);cx.stroke();
  // Name
  cx.fillStyle='rgba(240,192,64,0.9)';
  cx.font='bold 8px Courier New';cx.textAlign='center';
  cx.fillText(NAMES[sel],x,hCY-hR-6);
  cx.textAlign='left';
}

// ── SPEECH BUBBLE ──
function showBub(txt){
  const el=$('bub');
  el.textContent=txt;
  el.classList.add('on');
  bubTimer=160;
}

function flashRed(){
  const f=$('flash');f.classList.add('on');
  setTimeout(()=>f.classList.remove('on'),100);
}

// ── CONTROLS ──
// Keyboard
document.addEventListener('keydown',e=>{
  if(!running)return;
  if(e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();moveUp();}
  if(e.code==='ArrowDown'||e.code==='KeyS'){e.preventDefault();moveDown();}
});

// Touch — upper half = up, lower half = down
// Use the wrap element for touch to get full coverage
wrap.addEventListener('touchstart',e=>{
  if(!running)return;
  e.preventDefault();
  const rect=wrap.getBoundingClientRect();
  const touch=e.touches[0];
  const relY=touch.clientY-rect.top;
  if(relY<rect.height*0.5) moveUp(); else moveDown();
},{passive:false});

// Also explicit buttons as fallback
$('ctrlUp').addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();if(running)moveUp();},{passive:false});
$('ctrlDown').addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();if(running)moveDown();},{passive:false});
$('ctrlUp').addEventListener('click',()=>{if(running)moveUp();});
$('ctrlDown').addEventListener('click',()=>{if(running)moveDown();});

function moveUp(){
  // Move to upper third
  pyTarget = C.height * 0.28;
}
function moveDown(){
  // Move to lower third
  pyTarget = C.height * 0.72;
}

// ── END STATES ──
function gameOver(){
  running=false;cancelAnimationFrame(raf);
  music.pause();musicOn=false;
  hide('hud');$('ctrlUp').classList.add('off');$('ctrlDown').classList.add('off');
  $('musicBtn').classList.remove('show');$('bub').classList.remove('on');
  $('oSc').textContent=score;
  $('oQ').textContent=OQ[Math.floor(Math.random()*OQ.length)];
  $('oEm').textContent='🤬';
  show('sOver');
}

function winGame(){
  running=false;cancelAnimationFrame(raf);
  music.pause();musicOn=false;
  hide('hud');$('ctrlUp').classList.add('off');$('ctrlDown').classList.add('off');
  $('musicBtn').classList.remove('show');
  $('wSc').textContent=score;
  show('sWin');
}

function restart(){hide('sOver');hide('sWin');startWithMusic();}

function goMenu(){
  hide('sOver');hide('sWin');
  hide('hud');$('ctrlUp').classList.add('off');$('ctrlDown').classList.add('off');
  $('musicBtn').classList.remove('show');
  music.pause();musicOn=false;
  show('sStart');
}
</script>
